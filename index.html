<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Notebook</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="site">
  <header class="site-hero">
    <div class="site-hero__image" aria-hidden="true"></div>
    <div class="site-shell site-hero__inner">
      <p class="eyebrow">Recipe Notebook</p>
      <h1>料理レシピ</h1>
      <p class="hero-copy">いつもの料理を、見返しやすく、作りやすく。</p>
    </div>
  </header>

  <main class="site-shell site-main">
    <section class="recipe-toolbar" aria-label="レシピ検索">
      <div class="search-box">
        <label for="recipe-search">検索</label>
        <input id="recipe-search" type="search" placeholder="料理名・食材・タグ" autocomplete="off">
      </div>
      <div class="recipe-count">1件</div>
    </section>

    <section class="recipe-grid" aria-label="レシピ一覧">
      <a class="recipe-card" href="recipes/20260603-ninjin-shirishiri/index.html" data-recipe-card data-search="にんじんシリシリ 副菜 にんじん, ツナ, 和風, 時短, 作り置き にんじん, ツナ缶 にんじん2本とツナ缶で作る、短時間の副菜。甘辛い和風味で、あと一品ほしい時や作り置きに使いやすい。">
        <div class="recipe-card__category">副菜</div>
        <h2>にんじんシリシリ</h2>
        <p class="recipe-card__summary">にんじん2本とツナ缶で作る、短時間の副菜。甘辛い和風味で、あと一品ほしい時や作り置きに使いやすい。</p>
        <div class="recipe-card__meta">
          <span class="chip">4人分（にんじん2本分）</span><span class="chip">約5分</span><span class="chip">にんじん</span><span class="chip">ツナ</span><span class="chip">和風</span>
        </div>
      </a>
    </section>
  </main>

  <script src="assets/site.js"></script>
</body>
</html>
